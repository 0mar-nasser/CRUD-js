<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD App | Modern Task Management</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="neon-text">CRUD</span> App
            </div>
            <div class="header-actions">
                <div class="search-container" id="searchContainer">
                    <button class="search-toggle-btn" id="searchToggleBtn">
                        <i class="fa-solid fa-magnifying-glass" style="color: rgb(34, 159, 255);"></i> </button>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search tasks...">
                    </div>
                </div>
                <button id="addTaskBtn" class="primary-btn">
                    <span>+ Add Task</span>
                </button>
            </div>
        </header>

        <main>
            <div class="filters-bar">
                <div class="filter-group">
                    <label>Filter:</label>
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <div class="sort-group">
                    <label>Sort:</label>
                    <select id="sortSelect">
                        <option value="newest">Newest</option>
                        <option value="oldest">Oldest</option>
                        <option value="priority">Priority</option>
                        <option value="dueDate">Due Date</option>
                    </select>
                </div>
            </div>

            <div id="taskList" class="task-grid">
                <!-- Tasks will be injected here -->
            </div>

            <div id="emptyState" class="empty-state hidden">
                <div class="empty-icon">✨</div>
                <h2>No tasks found</h2>
                <p>Start your day by adding some tasks!</p>
            </div>
        </main>

        <!-- Modal for Add/Edit -->
        <div id="taskModal" class="modal hidden">
            <div class="modal-content glass-effect">
                <div class="modal-header">
                    <h2 id="modalTitle">New Task</h2>
                    <button class="close-btn">&times;</button>
                </div>
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    <div class="form-group">
                        <label for="taskTitle">Task Name</label>
                        <input type="text" id="taskTitle" required placeholder="What needs to be done?" autocomplete="off">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="taskPriority">Priority</label>
                            <select id="taskPriority">
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="taskCategory">Category</label>
                            <select id="taskCategory">
                                <option value="work">Work</option>
                                <option value="personal">Personal</option>
                                <option value="shopping">Shopping</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="taskDate">Due Date</label>
                            <input type="date" id="taskDate">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="taskDesc">Description</label>
                        <textarea id="taskDesc" rows="2" placeholder="Add more details..."></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="secondary-btn cancel-btn">Cancel</button>
                        <button type="submit" id="saveTaskBtn" class="primary-btn">Create Task</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>

</html>
